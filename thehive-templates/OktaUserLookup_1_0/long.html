<div class="report" ng-if="success">
  <style>
    .report-LdapQuery dl {
      margin-bottom: 2px;
    }
  </style>

  <div class="panel panel-info">
    <div class="panel-heading">
      <strong>Okta User Lookup Results</strong>
    </div>
    <div class="panel-body">
      <div ng-if="(content.results | json) == '{}'">
        No records found
      </div>
      <div ng-if="(content.results | json) != '{}'">
        <div ng-repeat="(key, value) in content.results">
            <dt>{{key}}: </dt>
            <dd class="wrap">{{value}}</dd>
          <hr/>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="panel panel-danger" ng-if="!success">
    <div class="panel-heading">
        <strong><i class="fa fa-warning"></i> OktaUserLookup - Error for {{artifact.data}}</strong>
    </div>
    <div class="panel-body">
        <dl class="dl-horizontal">
            <dt>Error:</dt>
            <dd class="wrap">{{content.errorMessage}}</dd>
        </dl>
    </div>
</div>
